<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitTrack Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="dashboard">
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <h1>FitTrack</h1>
        <p>Daily progress in 5 minutes.</p>
      </div>
      <nav class="side-nav">
        <a href="index.html" data-page="dashboard"><span class="nav-badge">D</span><span class="nav-label">Dashboard</span></a>
        <a href="running.html" data-page="running"><span class="nav-badge">R</span><span class="nav-label">Running</span></a>
        <a href="workouts.html" data-page="workouts"><span class="nav-badge">W</span><span class="nav-label">Workouts</span></a>
        <a href="nutrition.html" data-page="nutrition"><span class="nav-badge">N</span><span class="nav-label">Nutrition</span></a>
        <a href="body.html" data-page="body"><span class="nav-badge">B</span><span class="nav-label">Body</span></a>
        <a href="plan.html" data-page="plan"><span class="nav-badge">S</span><span class="nav-label">Split Plan</span></a>
      </nav>
    </aside>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="content-shell">
      <header class="page-header">
        <button type="button" class="icon-btn" id="sidebarToggle">☰</button>
        <div>
          <h2>Dashboard</h2>
          <p class="subtle">Fast overview of run, workout, nutrition, and body progress.</p>
        </div>
      </header>

      <main class="grid">
        <section class="panel span-2">
          <h3>Today Snapshot</h3>
          <div id="dashboardToday" class="list"></div>
        </section>

        <section class="panel span-2">
          <h3>Quick 5-Minute Checklist</h3>
          <div id="dashboardChecklist" class="list"></div>
        </section>

        <section class="panel span-2">
          <h3>Overall Metrics</h3>
          <div id="dashboardMetrics" class="metrics"></div>
        </section>

        <section class="panel span-2">
          <h3>AI Lift Targets</h3>
          <div id="dashboardAiGoals" class="list"></div>
        </section>

        <section class="panel span-2">
          <h3>Recent Logs</h3>
          <div id="dashboardRecent" class="list"></div>
        </section>
      </main>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
