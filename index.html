<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitTrack - Running & Workout Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div>
        <p class="eyebrow">Fitness Dashboard</p>
        <h1>FitTrack</h1>
        <p class="subtitle">Track two core lanes: Running and Workout.</p>
      </div>
      <div class="today-card" id="todayCard"></div>
    </header>

    <main class="grid">
      <section class="panel">
        <h2>Set Weekly Goals</h2>
        <form id="goalForm" class="stack">
          <h3>Running</h3>
          <label>
            Miles per week
            <input type="number" id="goalRunMiles" min="1" step="0.5" required />
          </label>
          <label>
            Runs per week
            <input type="number" id="goalRunDays" min="1" max="14" required />
          </label>

          <h3>Workout</h3>
          <label>
            Workout sessions per week
            <input type="number" id="goalWorkoutSessions" min="1" max="21" required />
          </label>
          <label>
            Strength minutes per week
            <input type="number" id="goalWorkoutMinutes" min="30" step="15" required />
          </label>

          <button type="submit">Save Goals</button>
        </form>
      </section>

      <section class="panel">
        <h2>Log Today</h2>
        <form id="logForm" class="stack">
          <h3>Running</h3>
          <label>
            Miles today
            <input type="number" id="logRunMiles" min="0" step="0.1" required />
          </label>
          <label>
            Run completed?
            <select id="logRunDone" required>
              <option value="no">No</option>
              <option value="yes">Yes</option>
            </select>
          </label>

          <h3>Workout</h3>
          <label>
            Workout completed?
            <select id="logWorkoutDone" required>
              <option value="no">No</option>
              <option value="yes">Yes</option>
            </select>
          </label>
          <label>
            Workout minutes
            <input type="number" id="logWorkoutMinutes" min="0" step="5" required />
          </label>

          <label>
            Notes
            <textarea id="logNotes" rows="3" placeholder="How did training feel today?"></textarea>
          </label>
          <button type="submit">Save Daily Log</button>
        </form>
      </section>

      <section class="panel span-2">
        <h2>Progress Overview</h2>
        <div class="metrics" id="metrics"></div>
      </section>

      <section class="panel span-2">
        <h2>Recent Logs</h2>
        <div id="history" class="history"></div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
