<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitTrack Body Progress</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="body">
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <h1>Body Progress</h1>
        <p>Track weight, measurements, and daily photos.</p>
      </div>
      <nav class="nav">
        <a href="index.html" data-page="dashboard">Dashboard</a>
        <a href="running.html" data-page="running">Running</a>
        <a href="workouts.html" data-page="workouts">Workouts</a>
        <a href="nutrition.html" data-page="nutrition">Nutrition</a>
        <a href="body.html" data-page="body">Body</a>
        <a href="plan.html" data-page="plan">Split Plan</a>
      </nav>
    </header>

    <main class="grid">
      <section class="panel">
        <h2>Body Entry</h2>
        <form id="bodyForm" class="stack">
          <label>Date<input type="date" id="bodyDate" required /></label>
          <label>Weight (lb)<input type="number" id="bodyWeight" min="0" step="0.1" required /></label>
          <label>Waist (in)<input type="number" id="bodyWaist" min="0" step="0.1" /></label>
          <label>Chest (in)<input type="number" id="bodyChest" min="0" step="0.1" /></label>
          <label>Arms (in)<input type="number" id="bodyArms" min="0" step="0.1" /></label>
          <label>Legs (in)<input type="number" id="bodyLegs" min="0" step="0.1" /></label>
          <label>Progress photo<input type="file" id="bodyPhoto" accept="image/*" /></label>
          <button type="submit">Save Body Entry</button>
        </form>
      </section>

      <section class="panel span-2">
        <h2>Body Metrics</h2>
        <div id="bodyMetrics" class="metrics"></div>
      </section>

      <section class="panel span-2">
        <h2>Body History + Photo Timeline</h2>
        <div id="bodyHistory" class="list"></div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
