<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitTrack Body Progress</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="body">
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <h1>FitTrack</h1>
        <p>Daily progress in 5 minutes.</p>
      </div>
      <nav class="side-nav">
        <a href="index.html" data-page="dashboard"><span class="nav-badge">D</span><span class="nav-label">Dashboard</span></a>
        <a href="running.html" data-page="running"><span class="nav-badge">R</span><span class="nav-label">Running</span></a>
        <a href="workouts.html" data-page="workouts"><span class="nav-badge">W</span><span class="nav-label">Workouts</span></a>
        <a href="nutrition.html" data-page="nutrition"><span class="nav-badge">N</span><span class="nav-label">Nutrition</span></a>
        <a href="body.html" data-page="body"><span class="nav-badge">B</span><span class="nav-label">Body</span></a>
        <a href="plan.html" data-page="plan"><span class="nav-badge">S</span><span class="nav-label">Split Plan</span></a>
      </nav>
    </aside>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="content-shell">
      <header class="page-header">
        <button type="button" class="icon-btn" id="sidebarToggle">☰</button>
        <div>
          <h2>Body Progress</h2>
          <p class="subtle">Track measurements, weight, and progress photos.</p>
        </div>
      </header>

      <main class="grid">
        <section class="panel">
          <h3>Body Entry</h3>
          <form id="bodyForm" class="stack">
            <label>Date<input type="date" id="bodyDate" required /></label>
            <label>Weight (lb)<input type="number" id="bodyWeight" min="0" step="0.1" required /></label>
            <label>Waist (in)<input type="number" id="bodyWaist" min="0" step="0.1" /></label>
            <label>Chest (in)<input type="number" id="bodyChest" min="0" step="0.1" /></label>
            <label>Arms (in)<input type="number" id="bodyArms" min="0" step="0.1" /></label>
            <label>Legs (in)<input type="number" id="bodyLegs" min="0" step="0.1" /></label>
            <label>Progress photo<input type="file" id="bodyPhoto" accept="image/*" /></label>
            <button type="submit">Save Body Entry</button>
          </form>
        </section>

        <section class="panel span-2">
          <h3>Body Metrics</h3>
          <div id="bodyMetrics" class="metrics"></div>
        </section>

        <section class="panel span-2">
          <h3>Body History + Photo Timeline</h3>
          <div id="bodyHistory" class="list"></div>
        </section>
      </main>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
