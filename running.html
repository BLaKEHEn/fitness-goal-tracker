<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitTrack Running</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="running">
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <h1>FitTrack</h1>
        <p>Daily progress in 5 minutes.</p>
      </div>
      <nav class="side-nav">
        <a href="index.html" data-page="dashboard"><span class="nav-badge">D</span><span class="nav-label">Dashboard</span></a>
        <a href="running.html" data-page="running"><span class="nav-badge">R</span><span class="nav-label">Running</span></a>
        <a href="workouts.html" data-page="workouts"><span class="nav-badge">W</span><span class="nav-label">Workouts</span></a>
        <a href="nutrition.html" data-page="nutrition"><span class="nav-badge">N</span><span class="nav-label">Nutrition</span></a>
        <a href="body.html" data-page="body"><span class="nav-badge">B</span><span class="nav-label">Body</span></a>
        <a href="plan.html" data-page="plan"><span class="nav-badge">S</span><span class="nav-label">Split Plan</span></a>
      </nav>
    </aside>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="content-shell">
      <header class="page-header">
        <button type="button" class="icon-btn" id="sidebarToggle">☰</button>
        <div>
          <h2>Running</h2>
          <p class="subtle">Track daily 2-mile runs and hit weekly/monthly targets.</p>
        </div>
      </header>

      <main class="grid">
        <section class="panel">
          <h3>Running Goals</h3>
          <form id="runGoalForm" class="stack">
            <label>Daily miles goal<input type="number" id="runGoalDailyMiles" min="0.5" step="0.1" required /></label>
            <label>Daily time goal (minutes)<input type="number" id="runGoalDailyMinutes" min="1" step="1" required /></label>
            <label>Weekly miles goal<input type="number" id="runGoalWeeklyMiles" min="1" step="0.5" required /></label>
            <label>Monthly miles goal<input type="number" id="runGoalMonthlyMiles" min="1" step="1" required /></label>
            <button type="submit">Save Running Goals</button>
          </form>
        </section>

        <section class="panel">
          <h3>Running Log</h3>
          <form id="runLogForm" class="stack">
            <label>Date<input type="date" id="runDate" required /></label>
            <label>Miles<input type="number" id="runMiles" min="0" step="0.1" required /></label>
            <label>Time (minutes)<input type="number" id="runMinutes" min="0" step="1" required /></label>
            <button type="submit">Save Run</button>
          </form>
        </section>

        <section class="panel span-2">
          <h3>Running Metrics</h3>
          <div id="runMetrics" class="metrics"></div>
        </section>

        <section class="panel span-2">
          <h3>Running History</h3>
          <div id="runHistory" class="list"></div>
        </section>
      </main>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
