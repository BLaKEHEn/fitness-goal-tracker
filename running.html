<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitTrack Running</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="running">
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <h1>Running</h1>
        <p>Track your 2-mile daily target with day/week/month goals.</p>
      </div>
      <nav class="nav">
        <a href="index.html" data-page="dashboard">Dashboard</a>
        <a href="running.html" data-page="running">Running</a>
        <a href="workouts.html" data-page="workouts">Workouts</a>
        <a href="nutrition.html" data-page="nutrition">Nutrition</a>
        <a href="body.html" data-page="body">Body</a>
        <a href="plan.html" data-page="plan">Split Plan</a>
      </nav>
    </header>

    <main class="grid">
      <section class="panel">
        <h2>Running Goals</h2>
        <form id="runGoalForm" class="stack">
          <label>Daily miles goal<input type="number" id="runGoalDailyMiles" min="0.5" step="0.1" required /></label>
          <label>Daily time goal (minutes)<input type="number" id="runGoalDailyMinutes" min="1" step="1" required /></label>
          <label>Weekly miles goal<input type="number" id="runGoalWeeklyMiles" min="1" step="0.5" required /></label>
          <label>Monthly miles goal<input type="number" id="runGoalMonthlyMiles" min="1" step="1" required /></label>
          <button type="submit">Save Running Goals</button>
        </form>
      </section>

      <section class="panel">
        <h2>Running Log</h2>
        <form id="runLogForm" class="stack">
          <label>Date<input type="date" id="runDate" required /></label>
          <label>Miles<input type="number" id="runMiles" min="0" step="0.1" required /></label>
          <label>Time (minutes)<input type="number" id="runMinutes" min="0" step="1" required /></label>
          <button type="submit">Save Run</button>
        </form>
      </section>

      <section class="panel span-2">
        <h2>Running Metrics</h2>
        <div id="runMetrics" class="metrics"></div>
      </section>

      <section class="panel span-2">
        <h2>Running History</h2>
        <div id="runHistory" class="list"></div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
